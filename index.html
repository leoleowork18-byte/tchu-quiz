<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вікторина «Що ти знаєш про Український Червоний Хрест?»</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --red:#D7282F;
    --red-dark:#A81B23;
    --red-soft:#FBE9E9;
    --ink:#1A1518;
    --paper:#FBF8F4;
    --card:#FFFFFF;
    --muted:#7C7378;
    --line:#EDE6DF;
    --green:#1F9D62;
    --green-soft:#E6F4EC;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Inter',system-ui,sans-serif;
    background:var(--paper);
    color:var(--ink);
    min-height:100dvh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
    background-image:
      linear-gradient(var(--line) 1px,transparent 1px),
      linear-gradient(90deg,var(--line) 1px,transparent 1px);
    background-size:46px 46px;
    background-position:center;
  }
  .wrap{
    width:100%;
    max-width:620px;
    background:var(--card);
    border:1.5px solid var(--ink);
    border-radius:22px;
    box-shadow:10px 12px 0 rgba(26,21,24,.9);
    overflow:hidden;
  }
  .topbar{
    display:flex;align-items:center;gap:12px;
    padding:18px 24px;
    border-bottom:1.5px solid var(--line);
  }
  .mark{flex:0 0 auto}
  .mark svg{display:block}
  .brand{font-family:'Unbounded';font-weight:800;font-size:14px;letter-spacing:.02em;line-height:1.15}
  .brand small{display:block;font-family:'Inter';font-weight:500;font-size:11px;color:var(--muted);letter-spacing:.04em;text-transform:uppercase}
  .stage{padding:30px 30px 34px}

  /* progress */
  .meter{display:flex;align-items:center;gap:14px;margin-bottom:26px}
  .track{flex:1;height:8px;background:var(--line);border-radius:99px;overflow:hidden}
  .fill{height:100%;width:0;background:var(--red);border-radius:99px;transition:width .4s cubic-bezier(.2,.8,.2,1)}
  .count{font-family:'Unbounded';font-weight:600;font-size:13px;white-space:nowrap}
  .count b{color:var(--red)}

  /* intro */
  .hero-cross{display:flex;justify-content:center;margin:6px 0 22px}
  h1{font-family:'Unbounded';font-weight:800;font-size:30px;line-height:1.1;text-align:center;letter-spacing:-.01em}
  .lede{text-align:center;color:var(--muted);font-size:15px;line-height:1.55;margin:14px auto 26px;max-width:430px}
  .source{text-align:center;font-size:12px;color:var(--muted);margin-top:18px}
  .source a{color:var(--red);text-decoration:none;font-weight:600}

  /* question */
  .qmeta{font-family:'Unbounded';font-weight:600;font-size:12px;color:var(--red);letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px}
  .qtext{font-family:'Unbounded';font-weight:600;font-size:21px;line-height:1.3;margin-bottom:22px}
  .opts{display:flex;flex-direction:column;gap:11px}
  .opt{
    display:flex;align-items:center;gap:13px;
    text-align:left;width:100%;
    padding:15px 17px;
    background:var(--paper);
    border:1.5px solid var(--line);
    border-radius:13px;
    font-family:'Inter';font-size:15.5px;font-weight:500;color:var(--ink);
    cursor:pointer;
    transition:transform .12s ease,border-color .15s ease,background .15s ease;
  }
  .opt:hover:not(:disabled){border-color:var(--ink);transform:translateX(3px)}
  .opt:focus-visible{outline:3px solid var(--red);outline-offset:2px}
  .opt:disabled{cursor:default}
  .key{
    flex:0 0 auto;width:27px;height:27px;border-radius:7px;
    background:var(--card);border:1.5px solid var(--line);
    display:flex;align-items:center;justify-content:center;
    font-family:'Unbounded';font-weight:600;font-size:12px;color:var(--muted)
  }
  .opt.correct{background:var(--green-soft);border-color:var(--green);color:var(--ink)}
  .opt.correct .key{background:var(--green);border-color:var(--green);color:#fff}
  .opt.wrong{background:var(--red-soft);border-color:var(--red);color:var(--ink)}
  .opt.wrong .key{background:var(--red);border-color:var(--red);color:#fff}

  .explain{
    margin-top:18px;padding:15px 17px;border-radius:13px;
    background:var(--red-soft);border:1.5px solid #F1C9CB;
    font-size:14px;line-height:1.55;
    display:none;
  }
  .explain.show{display:block;animation:rise .3s ease}
  .explain b{font-family:'Unbounded';font-weight:600}
  @keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  /* buttons */
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:9px;
    font-family:'Unbounded';font-weight:600;font-size:15px;
    padding:15px 26px;border-radius:13px;border:1.5px solid var(--ink);
    background:var(--red);color:#fff;cursor:pointer;width:100%;
    box-shadow:4px 4px 0 var(--ink);
    transition:transform .12s ease,box-shadow .12s ease;
  }
  .btn:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 var(--ink)}
  .btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--ink)}
  .btn:focus-visible{outline:3px solid var(--red);outline-offset:3px}
  .btn.ghost{background:var(--card);color:var(--ink)}
  .btn.next{margin-top:20px;display:none}
  .btn.next.show{display:flex;animation:rise .3s ease}

  /* result */
  .res-emblem{display:flex;justify-content:center;margin:4px 0 18px}
  .score-big{font-family:'Unbounded';font-weight:800;font-size:54px;text-align:center;line-height:1;color:var(--red)}
  .score-big span{font-size:26px;color:var(--ink)}
  .tier{font-family:'Unbounded';font-weight:600;font-size:20px;text-align:center;margin:14px 0 8px}
  .tier-msg{text-align:center;color:var(--muted);font-size:15px;line-height:1.55;max-width:430px;margin:0 auto 24px}
  .cta{margin-top:12px}
  .cta a{
    display:block;text-align:center;text-decoration:none;
    color:var(--red);font-weight:600;font-size:13.5px;margin-top:16px
  }
  @media (max-width:520px){
    .stage{padding:24px 20px 28px}
    h1{font-size:25px}
    .qtext{font-size:19px}
    .score-big{font-size:46px}
    .wrap{box-shadow:7px 8px 0 rgba(26,21,24,.9)}
  }
  @media (prefers-reduced-motion:reduce){
    *{transition:none!important;animation:none!important}
  }
</style>
</head>

    </div>
    <h1>Що ти знаєш про Український Червоний Хрест?</h1>
    <p class="lede">10 питань про історію, принципи й діяльність Українського Червоного Хреста. Дізнаймось, наскільки добре ви знаєте найбільшу гуманітарну організацію країни.</p>
    <button class="btn" id="start">Почати вікторину →</button>
    <p class="source">Питання на основі <a href="https://redcross.org.ua/" target="_blank" rel="noopener">redcross.org.ua</a></p>
  `;
  document.getElementById('start').onclick = ()=>{ idx=0; score=0; renderQuestion(); };
}

function renderQuestion(){
  answered = false;
  const item = QUESTIONS[idx];
  const pct = Math.round((idx/QUESTIONS.length)*100);
  stage.innerHTML = `
    <div class="meter">
      <div class="track"><div class="fill" style="width:${pct}%"></div></div>
      <div class="count"><b>${idx+1}</b> / ${QUESTIONS.length}</div>
    </div>
    <div class="qmeta">Запитання ${idx+1}</div>
    <div class="qtext">${item.q}</div>
    <div class="opts" id="opts">
      ${item.opts.map((o,i)=>`
        <button class="opt" data-i="${i}">
          <span class="key">${String.fromCharCode(65+i)}</span>
          <span>${o}</span>
        </button>`).join('')}
    </div>
    <div class="explain" id="explain"></div>
    <button class="btn next" id="next"></button>
  `;
  document.querySelectorAll('.opt').forEach(b=>{
    b.onclick = ()=>choose(parseInt(b.dataset.i));
  });
}

function choose(i){
  if(answered) return;
  answered = true;
  const item = QUESTIONS[idx];
  const buttons = document.querySelectorAll('.opt');
  buttons.forEach(b=>{
    const bi = parseInt(b.dataset.i);
    b.disabled = true;
    if(bi === item.a) b.classList.add('correct');
    else if(bi === i) b.classList.add('wrong');
  });
  if(i === item.a) score++;
  const ex = document.getElementById('explain');
  ex.innerHTML = (i===item.a ? '✓ Правильно! ' : '✗ Не зовсім. ') + item.e;
  ex.classList.add('show');
  const next = document.getElementById('next');
  next.textContent = idx === QUESTIONS.length-1 ? 'Побачити результат →' : 'Далі →';
  next.classList.add('show');
  next.onclick = ()=>{
    idx++;
    if(idx >= QUESTIONS.length) renderResult();
    else renderQuestion();
  };
}

function renderResult(){
  let tier = TIERS[0];
  for(const t of TIERS) if(score >= t.min) tier = t;
  stage.innerHTML = `
    <div class="res-emblem">
      <svg width="76" height="76" viewBox="0 0 84 84" aria-hidden="true">
        <rect x="2" y="2" width="80" height="80" rx="18" fill="#D7282F"/>
        <path d="M34 14h16v20h20v16H50v20H34V50H14V34h20z" fill="#fff"/>
      </svg>
    </div>
    <div class="score-big">${score}<span>/${QUESTIONS.length}</span></div>
    <div class="tier">${tier.name}</div>
    <p class="tier-msg">${tier.msg}</p>
    <button class="btn ghost" id="again">Пройти ще раз ↺</button>
    <div class="cta">
      <a href="https://portal.redcross.org.ua/web/signup/user" target="_blank" rel="noopener">Стати волонтером Червоного Хреста →</a>
    </div>
  `;
  document.getElementById('again').onclick = renderIntro;
}

renderIntro();
